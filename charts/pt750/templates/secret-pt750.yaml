# pt750 reads its printer list from the L_PRINTERS env var:
#   L_PRINTERS=<friendlyName>=tcp://<host>:9100[,<friendlyName2>=...]
# We assemble that here from the same Bitwarden Login item used by the
# brother-ptouch-automation chart, pulling the printer host out of the
# Login item's Username field.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "{{ .Release.Name }}-secret"
spec:
  refreshInterval: 1h
  target:
    name: "{{ .Release.Name }}-secret"
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        L_PRINTERS: "{{ .Values.printerName }}={{ `tcp://{{ .printer_host }}:9100` }}"
  data:
    - secretKey: printer_host
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: SecretStore
      remoteRef:
        key: '{{ index .Values "bitwardenIds" "brother-ptouch-automation" }}'
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
