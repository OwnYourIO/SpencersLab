# PrivateBin wrapper chart configuration
privatebin:
  # Chart-specific configuration
  image:
    repository: privatebin/nginx-fpm-alpine
    tag: 1.7.4  # Latest stable version
  
  # Disable built-in ingress (use SpencersLab's generic-ingress)
  ingress:
    enabled: false
  
  # Service configuration
  service:
    type: ClusterIP
    port: 8080
  
  # Persistent storage for pastes
  persistence:
    enabled: true
    storageClass: "local-path"
    accessMode: ReadWriteOnce
    size: 5Gi
  
  # PrivateBin configuration
  configs:
    conf.php: |
      ; PrivateBin Configuration
      [main]
      name = "SpencersLab Paste"
      discussion = true
      opendiscussion = true
      password = true
      fileupload = true
      burnafterreadingselected = false
      defaultformatter = "plaintext"
      syntaxhighlightingtheme = "sons-of-obsidian"
      sizelimit = 10485760
      template = "bootstrap"
      languageselection = false
      languagedefault = "en"
      
      [expire]
      default = "1week"
      
      [expire_options]
      5min = 300
      10min = 600
      1hour = 3600
      1day = 86400
      1week = 604800
      1month = 2592000
      1year = 31536000
      never = 0
      
      [formatter_options]
      plaintext = "Plain Text"
      syntaxhighlighting = "Source Code"
      markdown = "Markdown"
      
      [traffic]
      limit = 10
      exempted = ""
      
      [purge]
      limit = 300
      batchsize = 10
      
      [model]
      class = Filesystem
      
      [model_options]
      dir = PATH "data"
  
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
