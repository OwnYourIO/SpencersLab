# Pulls the printer host and (optional) bearer token from a single Bitwarden
# Login item:
#   Username → host / IP of the Brother PT-P750W (e.g. label-maker.spencerslab.com)
#   Password → optional bearer token; leave blank to disable auth on the service
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "{{ .Release.Name }}-secret"
spec:
  refreshInterval: 1h
  target:
    name: "{{ .Release.Name }}-secret"
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LABEL_PRINTER_HOST: "{{ `{{ .printer_host }}` }}"
        LABEL_PRINTER_TOKEN: "{{ `{{ .printer_token }}` }}"
  data:
    - secretKey: printer_host
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: SecretStore
      remoteRef:
        key: '{{ index .Values "bitwardenIds" "brother-ptouch-automation" }}'
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: printer_token
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: SecretStore
      remoteRef:
        key: '{{ index .Values "bitwardenIds" "brother-ptouch-automation" }}'
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
