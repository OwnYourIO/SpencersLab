apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "{{ .Release.Name }}-secret"
spec:
  refreshInterval: 1h
  target:
    name: "{{ .Release.Name }}-secret"
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Address of the Brother PT-P750W on the LAN. Sourced from the
        # Bitwarden item's `host` field so the IP/DNS name doesn't have to
        # live in git.
        LABEL_PRINTER_HOST: "{{ `{{ .printer_host }}` }}"
        # Optional bearer token. If the Bitwarden field is empty, this becomes
        # an empty string and the upstream service runs with auth disabled.
        LABEL_PRINTER_TOKEN: "{{ `{{ .printer_token }}` }}"
  data:
    - secretKey: printer_host
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: SecretStore
      remoteRef:
        key: '{{ index .Values "bitwardenIds" "brother-ptouch-automation" }}'
        property: host
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: printer_token
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: SecretStore
      remoteRef:
        key: '{{ index .Values "bitwardenIds" "brother-ptouch-automation" }}'
        property: token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
