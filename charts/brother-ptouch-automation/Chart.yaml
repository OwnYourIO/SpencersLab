apiVersion: v2
name: brother-ptouch-automation
description: |
  HTTP service wrapper around the brother-ptouch-automation
  (https://github.com/harteWired/brother-ptouch-automation) label engine for
  Brother PT-P750W (also PT-P710BT, PT-E550W). Exposes /render and /print over
  HTTP so labels can be sent from CLI tools, Home Assistant, scripts, or
  Claude Code skills. Reaches the physical printer over TCP:9100 + UDP:161.
version: 1.0.0
appVersion: 0.2.0
dependencies:
- name: app-template
  version: 4.6.2
  repository: https://bjw-s-labs.github.io/helm-charts/
