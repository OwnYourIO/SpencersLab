bitwardenIds:
  playsms: OVERRIDE_VIA_CUSTOM_VALUES
  playsms-db: OVERRIDE_VIA_CUSTOM_VALUES

domain: OVERRIDE_VIA_APPSET

app-template:
  global:
    nameOverride: &chartName playsms

  controllers:
    playsms:
      initContainers:
        init-gammu-spool:
          image:
            repository: busybox
            tag: stable
          command:
            - sh
            - -c
            - |
              mkdir -p /var/spool/gammu/inbox \
                       /var/spool/gammu/outbox \
                       /var/spool/gammu/sent \
                       /var/spool/gammu/error
              # match the UID/GID playSMS + gammu run as
              chown -R 1000:1000 /var/spool/gammu
              chmod -R 0775 /var/spool/gammu
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        playsms:
          image:
            repository: playsms/playsms
            tag: 1.4.x
          env:
            TZ: Etc/UTC
            PLAYSMS_VERSION: "1.4.x"
            GID: "1000"
            UID: "1000"
          envFrom:
            - secretRef:
                name: "{{ .Release.Name }}"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          #securityContext:
          #  allowPrivilegeEscalation: false
          #  capabilities:
          #    drop:
          #      - ALL

        mariadb:
          image:
            repository: mariadb
            tag: lts
          env:
            TZ: Etc/UTC
            MARIADB_RANDOM_ROOT_PASSWORD: "1"
            MARIADB_DATABASE: "playsms"
          envFrom:
            - secretRef:
                name: "{{ .Release.Name }}-db"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          #securityContext:
          #  allowPrivilegeEscalation: false
          #  capabilities:
          #    drop:
          #      - ALL
        nginx:
          image:
            repository: nginx
            tag: stable-alpine
          env:
            WEBSERVER_SERVER_NAME: playsms
            WEBSERVER_HTTP_PORT: 80

        gammu:
          image:
            repository: valterseu/gammu-sms
            tag: latest
          env:
            TZ: Etc/UTC
          # Go straight to gammu and skip the existing command as it tries to run apache - not needed.
          command:
            - /bin/sh
            - -c
            - |
              exec gammu-smsd --config /etc/gammu-smsdrc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              squat.ai/ec25: 1
            limits:
              memory: 256Mi
              squat.ai/ec25: 1
          # Opening /dev/ttyUSB2 requires access to the host serial device.
          # privileged is the blunt-but-reliable option for passing a raw
          # character device into a container; see notes below for the
          # device-plugin alternative if privileged is disallowed.
          securityContext:
            privileged: true

  service:
    playsms:
      controller: *chartName
      ports:
        http:
          port: 80

  persistence:
    mysql-data:
      existingClaim: playsms-mysql
      globalMounts:
        - path: /var/lib/mysql
          subPath: mysql-data
    playsms:
      existingClaim: playsms-data
      globalMounts:
        - path: /home/playsms
          subPath: home
        - path: /var/www/html
          subPath: web
        - path: /var/spool/gammu
          subPath: gammu

    docker-setup:
      type: configMap
      name: "{{ .Release.Name}}"
      defaultMode: 0777
      globalMounts:
        - path: /_docker-setup.sh
          subPath: docker-setup.sh

    ngnix-template:
      type: configMap
      name: "{{ .Release.Name}}"
      defaultMode: 0777
      globalMounts:
        - path: /etc/nginx/templates/default.conf.template
          subPath: default.conf.template
    gammu-config:
      type: configMap
      name: "{{ .Release.Name }}-gammu"
      defaultMode: 0644
      globalMounts:
        - path: /etc/gammu-smsdrc
          subPath: gammu-smsdrc

    modem:
      type: hostPath
      hostPath: /dev/ttyUSB2
      hostPathType: CharDevice
      advancedMounts:
        playsms:
          gammu:
            - path: /dev/ttyUSB2
