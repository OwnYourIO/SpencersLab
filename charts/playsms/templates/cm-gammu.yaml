
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-gammu"
data:
  gammu-smsdrc: |
    [gammu]
    port = /dev/ttyUSB2
    connection = at
    logfile = /dev/stdout
    logformat = textall

    [smsd]
    Service = files
    InboxPath = /var/spool/gammu/inbox/
    OutboxPath = /var/spool/gammu/outbox/
    SentSMSPath = /var/spool/gammu/sent/
    ErrorSMSPath = /var/spool/gammu/error/
    InboxFormat = unicode
    OutboxFormat = unicode
    TransmitFormat = auto
    debugLevel = 1
    LogFile = /dev/stdout
    DeliveryReport = sms
    DeliveryReportDelay = 7200
    CheckSecurity = 0
    # If the SIM has a PIN, uncomment:
    # PIN = 1234

